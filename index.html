<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog test 10.07.26</title>
  <link rel="stylesheet" href="style_site_head_foot.css">
  <link rel="stylesheet" href="index.css">

</head>



<body>

  <header class="site-header">
    <div class="site-header-inner">
      <div class="header-logo">
        <a href="index.html" class="logo">
          <img src="assets/header/logo 03 1.png" alt="Travel Blog Logo">
        </a>
      </div>
      <div class="site-header-nav">
        <a href="article_01.html" class="nav-link">
          <img src="assets/header/menu points_ Highlights.png" alt="Highlights">
        </a>
        <a href="article_02.html" class="nav-link">
          <img src="assets/header/FAQ.png" alt="FAQ">
        </a>
        <a href="article_03.html" class="nav-link">
          <img src="assets/header/Contact.png" alt="Contact">
        </a>
      </div>
    </div>
  </header>

  <hero>
    <div class="hero-content">
      <div class="hero-yellow-panel">
        <img src="assets/home/vector-16.png" alt="panel-1">
      </div>
      <div class="hero-yellow-panel-2">
        <img src="assets/home/Vector17.png" alt="panel-2">
      </div>
      <div class="hero-image">
        <img src="assets/home/cappadocia.png" alt="Cappadocia">
      </div>
      <div class="hero-text">
        <h1 class="hero-title">Cappadocia</h1>
        <p class="hero-desc">From sunrise balloons to hidden cave dwellings, every moment feels unreal in the best way.</p>
      </div>
      <div class="hero-spin">
        <img src="assets/home/circle.png" alt="spin-image">
      </div>

      
    </div>


  </hero>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <div class="c-footer-logo">
        <a href="index.html" class="logo">
          <img src="assets/footer/copyright.png" alt="copyright-logo">
        </a>
      </div>
      <div class="footer-text-container">
        <p class="footer-text">Travel Blog 2026</p>
        <p class="footer-text">Imprint</p>
        <p class="footer-text">Cookie Preferences</p>
      </div>
      <div class="footer-logo-container">

        <img src="assets/footer/Tiktok_icon 1.png" alt="tiktok-logo">
        <img src="assets/footer/youtube.png" alt="youtube-logo">
        <img src="assets/footer/facebook.png" alt="facebook-logo">
        <img src="assets/footer/instagram.png" alt="instagram-logo">
      </div>
    </div>
  </footer>

</body>

</html>
